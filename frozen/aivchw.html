<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Value Capture Hardware ROI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root { color-scheme: light }
:root {
  --apex-navy: #1D4477;
  --apex-sky: #00B1EB;
  --apex-teal: #3ED8C3;
  --apex-deep-teal: #00A19F;
  --apex-dark-teal: #005E65;
  --apex-charcoal: #52555C;
  --apex-black: #000000;
  --apex-white: #FFFFFF;
  --apex-light-gray: #E8E8E4;
  --apex-mid-gray: #ADAFB1;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--apex-white); color: var(--apex-black); }
.nav { display: flex; background: var(--apex-navy); overflow-x: auto; }
.nav-tab { padding: 12px 20px; color: rgba(255,255,255,.7); cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; border-bottom: 3px solid transparent; transition: all .2s; }
.nav-tab:hover { color: #fff; background: rgba(255,255,255,.06); }
.nav-tab.active { color: #fff; border-bottom-color: var(--apex-teal); }
.hero { background: var(--apex-navy); color: #fff; padding: 32px 28px 24px; }
.hero h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.hero p { font-size: 13px; opacity: .8; }
.meta-bar { display: flex; gap: 24px; margin-top: 14px; flex-wrap: wrap; }
.meta-item { background: rgba(255,255,255,.1); padding: 8px 14px; border-radius: 6px; font-size: 12px; }
.meta-item strong { color: var(--apex-teal); }
.content { padding: 24px 28px; display: none; }
.content.active { display: block; }
.card { background: #fff; border: 1px solid var(--apex-light-gray); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.card h3 { color: var(--apex-navy); font-size: 15px; margin-bottom: 10px; }
.card p { color: var(--apex-charcoal); font-size: 13px; line-height: 1.6; }
.dim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.dim-card { border-left: 4px solid var(--apex-sky); }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.dim-score { font-size: 28px; font-weight: 700; color: var(--apex-navy); }
.dim-label { font-size: 11px; color: var(--apex-mid-gray); }
.score-bar { height: 6px; background: var(--apex-light-gray); border-radius: 3px; margin: 8px 0; }
.score-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.sub-list { list-style: none; font-size: 12px; color: var(--apex-charcoal); }
.sub-list li { padding: 3px 0; display: flex; justify-content: space-between; }
.roi-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.roi-table th { background: var(--apex-navy); color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; }
.roi-table td { padding: 10px 12px; border-bottom: 1px solid var(--apex-light-gray); }
.roi-table tr:nth-child(even) { background: #fafafa; }
.priority-high { color: #c0392b; font-weight: 700; }
.priority-mid { color: #e67e22; font-weight: 600; }
.priority-low { color: var(--apex-deep-teal); font-weight: 500; }
.gap-bar-container { width: 100px; height: 8px; background: var(--apex-light-gray); border-radius: 4px; display: inline-block; vertical-align: middle; margin-left: 6px; }
.gap-bar-fill { height: 100%; border-radius: 4px; }
.budget-input { border: 1px solid var(--apex-mid-gray); border-radius: 4px; padding: 4px 8px; font-size: 12px; width: 120px; }
.payback-input { border: 1px solid var(--apex-mid-gray); border-radius: 4px; padding: 4px 8px; font-size: 12px; width: 80px; }
.config-group { margin-bottom: 20px; }
.config-group label { display: block; font-size: 12px; color: var(--apex-charcoal); margin-bottom: 4px; font-weight: 600; }
.config-input { border: 1px solid var(--apex-mid-gray); border-radius: 6px; padding: 8px 12px; font-size: 13px; width: 260px; }
.config-score { border: 1px solid var(--apex-mid-gray); border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 70px; text-align: center; }
.config-target { border: 1px solid var(--apex-sky); border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 70px; text-align: center; background: rgba(0,177,235,.05); }
.journey-step { display: flex; gap: 16px; margin-bottom: 20px; align-items: flex-start; }
.step-num { width: 36px; height: 36px; background: var(--apex-navy); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.step-content h4 { color: var(--apex-navy); font-size: 14px; margin-bottom: 4px; }
.step-content p { color: var(--apex-charcoal); font-size: 12px; line-height: 1.5; }
.chart-container { max-width: 100%; margin: 0 auto; }
.footer { background: var(--apex-dark-teal); color: rgba(255,255,255,.8); padding: 16px 28px; font-size: 11px; display: flex; justify-content: space-between; }
@media (max-width: 600px) {
  .dim-grid { grid-template-columns: 1fr; }
  .meta-bar { flex-direction: column; gap: 8px; }
}
/* === MOBILE FIX (data-mobile-fix) — additiv, nichts oben geaendert === */
@media (max-width: 768px) {
  table.roi-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  img, svg, canvas { max-width: 100%; height: auto; }
  .footer { flex-direction: column; gap: 6px; align-items: flex-start; }
  html, body { overflow-x: hidden; }
  /* Configuration-Tab: 3-Spalten-Grid + fixe Input-Breite sprengten den Viewport (nicht scrollbar) */
  div[style*="grid-template-columns:1fr 1fr 1fr"] { grid-template-columns: 1fr !important; }
  .config-group { min-width: 0; }
  .config-input { width: 100%; max-width: 100%; box-sizing: border-box; }
}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="hero">
  <h1>AI Value Capture Hardware ROI</h1>
  <p>Hardware Maturity &amp; Investment Prioritization for AI-Ready Work Environments</p>
  <div class="meta-bar">
    <div class="meta-item">Client: <strong id="metaClient">Example Corp</strong></div>
    <div class="meta-item">Date: <strong id="metaDate">2026-04-29</strong></div>
    <div class="meta-item">n = <strong id="metaN">8</strong></div>
    <div class="meta-item">Avg. Score: <strong id="metaAvg">—</strong></div>
    <div class="meta-item">Investment Gap: <strong id="metaGap">—</strong></div>
  </div>
</div>
<div class="content" id="tab-overview"></div>
<div class="content" id="tab-dimensions"></div>
<div class="content" id="tab-roi"></div>
<div class="content" id="tab-action"></div>
<div class="content" id="tab-journey"></div>
<div class="content" id="tab-config"></div>
<div class="footer">
  <span>Project Apex — AI Value Capture Hardware ROI</span>
  <span>6 Dimensions · 18 Sub-Dimensions · 42 Items · Hardware ROI</span>
</div>
<script>
const TABS=[{id:'overview',label:'Overview'},{id:'dimensions',label:'6 Dimensions'},{id:'roi',label:'ROI Analysis'},{id:'action',label:'Action Plan'},{id:'journey',label:'Hardware Journey'},{id:'config',label:'Configuration'}];
const DIMS=[
{code:'D1',name:'Workstation & End Devices',color:'#1D4477',subs:['Performance & AI Readiness','Equipment Coverage & Standardization','Refresh Cycles & Lifecycle'],desc:'Assesses the AI suitability of desktop computers, laptops and workstations — RAM, GPU, SSD and processing power for local AI applications.',findings:{low:'Outdated workstations without sufficient processing power for AI tools. Local AI applications (copilots, local LLMs) cannot be used. Urgent refresh needed.',mid:'Mixed equipment: parts of the workforce have AI-capable devices, others work with outdated hardware. Standardization is missing.',high:'Consistently powerful end devices with sufficient RAM and GPU capacity. AI copilots and local models run smoothly. Clear refresh strategy in place.'},measures:['Define minimum hardware standards for AI workstations (min. 32 GB RAM, GPU-capable)','Prioritized rollout plan for AI power users','Introduce standardized device profiles (Basic, Advanced, AI Power)','Shorten refresh cycles to 3–4 years for AI-relevant roles']},
{code:'D2',name:'Server & Compute Infrastructure',color:'#00B1EB',subs:['Capacity & Utilization','Hosting Model & Location','Scalability & Redundancy'],desc:'Measures the performance of the server landscape — on-premise, colocation or hosted — for AI training, inference and data processing.',findings:{low:'Server infrastructure outdated and not dimensioned for AI workloads. No GPU servers available. Capacity bottlenecks with data-intensive tasks.',mid:'Basic server capacity in place, but GPU resources for AI training are missing. Hosting model not optimal for AI scaling.',high:'Solid server infrastructure with GPU capacities. Hosting model supports AI workloads. Focus on cost optimization and scaling elasticity.'},measures:['Evaluate GPU server requirements for AI workloads (training vs. inference)','Compare hosting models: on-premise vs. colocation vs. cloud GPU','Create server capacity plan with AI growth projection','Redundancy and failover concept for AI-critical services']},
{code:'D3',name:'Mobile Devices & Edge Computing',color:'#3ED8C3',subs:['Mobile Device Equipment & MDM','Edge Computing Capability','IoT Sensors & Data Collection'],desc:'Assesses the mobile infrastructure — smartphones, tablets, edge devices and IoT sensors for AI-supported field processes.',findings:{low:'No systematic mobile device strategy. No MDM. Edge computing and IoT not in use. Mobile AI applications not possible.',mid:'MDM in place, but edge computing capabilities not developed. Mobile AI use cases identified but not yet actionable.',high:'Comprehensive MDM, edge-capable devices for on-site AI inference. IoT sensors feed data for AI models. Clear mobile AI strategy.'},measures:['Introduce or modernize mobile device management (MDM)','Identify and prioritize edge computing use cases','Develop IoT sensor strategy for data collection','Launch mobile AI pilot projects (e.g. quality control, predictive maintenance)']},
{code:'D4',name:'Network & Connectivity',color:'#00A19F',subs:['Bandwidth & Latency','WiFi & Remote Connectivity','Network Security & Segmentation'],desc:'Examines the network infrastructure for AI suitability — bandwidth for large data volumes, latency for real-time AI and secure segmentation.',findings:{low:'Network infrastructure undersized for AI data volumes. WiFi coverage patchy. No network segmentation for AI traffic.',mid:'Basic network capacity in place, but bottlenecks with large data transfers and remote access. Segmentation has room to grow.',high:'High-performance network with sufficient bandwidth and low latency. Full-coverage WiFi. Secure segmentation for AI workloads.'},measures:['Conduct network capacity analysis for AI data volumes','Upgrade WiFi infrastructure to WiFi 6/6E','Set up dedicated network segments for AI training and inference','Evaluate SD-WAN for distributed AI workloads']},
{code:'D5',name:'Peripherals & Specialized Hardware',color:'#005E65',subs:['Peripheral Equipment','Specialized AI Hardware','Space & Energy Infrastructure'],desc:'Assesses specialized hardware for AI applications — from high-resolution displays to AI accelerators, sensors and physical infrastructure.',findings:{low:'No AI-specific peripherals or specialized hardware. Data center capacity and power supply not dimensioned for AI.',mid:'Individual AI hardware components in place (e.g. GPU workstations), but not systematic. Energy and cooling capacity limited.',high:'Targeted investments in AI specialized hardware. Data center or hosting optimized for AI. Energy and cooling concept accounts for AI growth.'},measures:['Evaluate AI specialized hardware requirements (neural processing units, AI accelerators)','Assess and plan energy and cooling capacity for GPU workloads','Define ergonomic AI workstations (multi-monitor, high-resolution)','Ensure physical security for AI hardware']},
{code:'D6',name:'Procurement, Lifecycle & TCO',color:'#ADAFB1',subs:['Procurement Processes & Budget','Asset Management & Tracking','Sustainability & TCO Transparency'],desc:'Measures the organizational maturity of hardware procurement — processes, budget planning, asset tracking and total cost of ownership transparency.',findings:{low:'No structured hardware procurement for AI. No asset management. TCO intransparent. Investment decisions ad hoc.',mid:'Procurement processes in place, but not optimized for AI. Asset tracking incomplete. TCO only partially considered.',high:'Structured procurement with AI readiness criteria. Complete asset management. TCO transparent and integrated into investment decisions.'},measures:['Create AI hardware procurement policy with minimum standards','Introduce or expand IT asset management system','Create TCO model for AI hardware (acquisition, operations, energy, disposal)','Integrate sustainability criteria into hardware procurement']}
];
let state={client:'Example Corp',date:'2026-04-29',n:8,scores:[2.4,2.1,1.8,2.9,1.6,2.3],targets:[4.0,3.5,3.0,4.0,3.0,3.5],budgets:['60,000–120,000','150,000–400,000','40,000–100,000','50,000–150,000','80,000–200,000','20,000–50,000'],paybacks:[12,24,18,9,18,6],subScores:[[2.2,2.5,2.5],[2.0,2.3,2.0],[1.9,1.6,1.9],[3.1,2.7,2.9],[1.5,1.7,1.6],[2.4,2.1,2.4]]};
let radarChart=null;
function buildNav(){const nav=document.getElementById('nav');nav.innerHTML=TABS.map(t=>`<div class="nav-tab" data-tab="${t.id}">${t.label}</div>`).join('');nav.querySelectorAll('.nav-tab').forEach(tab=>tab.addEventListener('click',()=>switchTab(tab.dataset.tab)));}
function switchTab(id){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));document.querySelectorAll('.content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+id));if(id==='overview'&&radarChart)radarChart.update();}
function avg(arr){return arr.reduce((a,b)=>a+b,0)/arr.length;}
function gap(i){return Math.max(0,state.targets[i]-state.scores[i]);}
function totalGap(){return avg(DIMS.map((_,i)=>gap(i)));}
function priority(g){return g>=2?'High':g>=1?'Medium':'Low';}
function priClass(g){return g>=2?'priority-high':g>=1?'priority-mid':'priority-low';}
function gapColor(g){return g>=2?'#c0392b':g>=1?'#e67e22':'#00A19F';}
function scoreColor(s){return s<2?'#c0392b':s<3?'#e67e22':s<4?'#00B1EB':'#00A19F';}
function finding(dim,score){return score<2.5?dim.findings.low:score<3.5?dim.findings.mid:dim.findings.high;}
function updateMeta(){document.getElementById('metaClient').textContent=state.client;document.getElementById('metaDate').textContent=state.date;document.getElementById('metaN').textContent=state.n;document.getElementById('metaAvg').textContent=avg(state.scores).toFixed(2);document.getElementById('metaGap').textContent=totalGap().toFixed(2);}
function renderOverview(){const el=document.getElementById('tab-overview');const avgScore=avg(state.scores);const tGap=totalGap();const weakest=DIMS.reduce((a,d,i)=>state.scores[i]<state.scores[a]?i:a,0);const strongest=DIMS.reduce((a,d,i)=>state.scores[i]>state.scores[a]?i:a,0);const highPri=DIMS.filter((_,i)=>gap(i)>=2).length;
el.innerHTML=`<div class="card"><h3>Executive Summary</h3><p>The hardware analysis for <strong>${state.client}</strong> shows an average maturity score of <strong>${avgScore.toFixed(1)}/5.0</strong> with an investment gap of <strong>${tGap.toFixed(1)} points</strong> to the target state. ${highPri>0?`<strong>${highPri} of 6 dimensions</strong> have high investment priority.`:'No dimension has a critically high priority.'} The strongest dimension is <strong>${DIMS[strongest].name}</strong> (${state.scores[strongest].toFixed(1)}), the highest need for action lies with <strong>${DIMS[weakest].name}</strong> (${state.scores[weakest].toFixed(1)}).</p></div>
<div class="card" style="margin-bottom:16px;"><div class="chart-container"><canvas id="radarCanvas"></canvas></div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;"><div class="card" style="grid-column:1/-1;"><h3>Hardware Maturity Profile</h3>${DIMS.map((d,i)=>`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--apex-charcoal);"><span>${d.code}: ${d.name}</span><span style="font-weight:700;color:${scoreColor(state.scores[i])}">${state.scores[i].toFixed(1)}</span></div><div class="score-bar"><div class="score-fill" style="width:${state.scores[i]/5*100}%;background:${d.color}"></div></div><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--apex-mid-gray);"><span>Gap: ${gap(i).toFixed(1)}</span><span class="${priClass(gap(i))}">${priority(gap(i))}</span></div></div>`).join('')}</div></div>
<div class="card"><h3>Top 3 Investment Priorities</h3>${DIMS.map((d,i)=>({d,i,g:gap(i)})).sort((a,b)=>b.g-a.g).slice(0,3).map((x,rank)=>`<div style="display:flex;gap:12px;align-items:center;padding:8px 0;${rank<2?'border-bottom:1px solid var(--apex-light-gray);':''}"><div style="width:28px;height:28px;background:${gapColor(x.g)};color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;">${rank+1}</div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--apex-navy);">${x.d.name}</div><div style="font-size:11px;color:var(--apex-charcoal);">Gap: ${x.g.toFixed(1)} | Budget: ${state.budgets[x.i]} € | Payback: ~${state.paybacks[x.i]} months</div></div><div class="${priClass(x.g)}" style="font-size:12px;">${priority(x.g)}</div></div>`).join('')}</div>`;buildRadar();}
function buildRadar(){const ctx=document.getElementById('radarCanvas');if(!ctx)return;if(radarChart)radarChart.destroy();radarChart=new Chart(ctx,{type:'radar',data:{labels:DIMS.map(d=>d.code+': '+d.name),datasets:[{label:'Current Score',data:state.scores,borderColor:'#1D4477',backgroundColor:'rgba(29,68,119,.15)',pointBackgroundColor:'#1D4477',borderWidth:2},{label:'Target Score',data:state.targets,borderColor:'#00B1EB',backgroundColor:'rgba(0,177,235,.08)',pointBackgroundColor:'#00B1EB',borderWidth:2,borderDash:[5,5]}]},options:{responsive:true,maintainAspectRatio:true,scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:13}},pointLabels:{font:{size:14,weight:'600'}}}},plugins:{legend:{position:'bottom',labels:{font:{size:13},padding:20}}}}});}
function renderDimensions(){const el=document.getElementById('tab-dimensions');el.innerHTML=`<div class="dim-grid">${DIMS.map((d,i)=>`<div class="card dim-card" style="border-left-color:${d.color}"><div class="dim-header"><div><div style="font-size:11px;color:var(--apex-mid-gray);">${d.code}</div><h3 style="margin:0">${d.name}</h3></div><div style="text-align:right"><div class="dim-score" style="color:${scoreColor(state.scores[i])}">${state.scores[i].toFixed(1)}</div><div class="dim-label">Target: ${state.targets[i].toFixed(1)}</div></div></div><div class="score-bar"><div class="score-fill" style="width:${state.scores[i]/5*100}%;background:${d.color}"></div></div><p style="margin:8px 0;font-size:12px;">${d.desc}</p><ul class="sub-list">${d.subs.map((s,si)=>`<li><span>${s}</span><span style="font-weight:600;color:${scoreColor(state.subScores[i][si])}">${state.subScores[i][si].toFixed(1)}</span></li>`).join('')}</ul><div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--apex-light-gray);font-size:12px;"><strong style="color:var(--apex-navy);">Finding:</strong> <span style="color:var(--apex-charcoal);">${finding(d,state.scores[i])}</span></div></div>`).join('')}</div>`;}
function renderROI(){const el=document.getElementById('tab-roi');const avgPayback=avg(state.paybacks.filter(p=>p>0));el.innerHTML=`<div class="card"><h3>Hardware ROI Overview</h3><p style="margin-bottom:12px;">Gap analysis based on current maturity score (survey) vs. target maturity score. Budget ranges and payback periods are configurable.</p><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;"><div style="background:var(--apex-navy);color:#fff;padding:14px;border-radius:8px;text-align:center;"><div style="font-size:24px;font-weight:700;">${totalGap().toFixed(1)}</div><div style="font-size:11px;opacity:.8;">Avg. Investment Gap</div></div><div style="background:var(--apex-sky);color:#fff;padding:14px;border-radius:8px;text-align:center;"><div style="font-size:24px;font-weight:700;">${DIMS.filter((_,i)=>gap(i)>=2).length}/6</div><div style="font-size:11px;opacity:.8;">High Priority</div></div><div style="background:var(--apex-deep-teal);color:#fff;padding:14px;border-radius:8px;text-align:center;"><div style="font-size:24px;font-weight:700;">~${Math.round(avgPayback)} mo.</div><div style="font-size:11px;opacity:.8;">Avg. Payback</div></div></div><table class="roi-table"><thead><tr><th>Dimension</th><th>Current</th><th>Target</th><th>Gap</th><th>Priority</th><th>Budget Range (€)</th><th>Payback</th></tr></thead><tbody>${DIMS.map((d,i)=>`<tr><td style="font-weight:600;color:var(--apex-navy);">${d.code}: ${d.name}</td><td style="font-weight:700;color:${scoreColor(state.scores[i])}">${state.scores[i].toFixed(1)}</td><td>${state.targets[i].toFixed(1)}</td><td>${gap(i).toFixed(1)}<div class="gap-bar-container"><div class="gap-bar-fill" style="width:${Math.min(gap(i)/3*100,100)}%;background:${gapColor(gap(i))}"></div></div></td><td class="${priClass(gap(i))}">${priority(gap(i))}</td><td>${state.budgets[i]}</td><td>~${state.paybacks[i]} mo.</td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Hardware Investment Prioritization</h3><canvas id="roiBarCanvas" height="200"></canvas></div>`;buildROIChart();}
function buildROIChart(){const ctx=document.getElementById('roiBarCanvas');if(!ctx)return;const sorted=DIMS.map((d,i)=>({d,i,g:gap(i)})).sort((a,b)=>b.g-a.g);new Chart(ctx,{type:'bar',data:{labels:sorted.map(x=>x.d.code),datasets:[{label:'Current Score',data:sorted.map(x=>state.scores[x.i]),backgroundColor:'#1D4477'},{label:'Gap to Target',data:sorted.map(x=>x.g),backgroundColor:sorted.map(x=>gapColor(x.g))}]},options:{responsive:true,scales:{x:{stacked:true},y:{stacked:true,max:5,ticks:{stepSize:1}}},plugins:{legend:{position:'bottom'}}}});}
function renderAction(){const el=document.getElementById('tab-action');const sorted=DIMS.map((d,i)=>({d,i,g:gap(i)})).sort((a,b)=>b.g-a.g);el.innerHTML=`<div class="card"><h3>Hardware Recommendations by Priority</h3><p style="margin-bottom:16px;">Measures ordered by investment gap — highest need for action first.</p></div>${sorted.map((x,rank)=>`<div class="card" style="border-left:4px solid ${gapColor(x.g)}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><h3 style="margin:0">${x.d.code}: ${x.d.name}</h3><span class="${priClass(x.g)}" style="font-size:12px;">Priority: ${priority(x.g)} (Gap: ${x.g.toFixed(1)})</span></div><p style="margin-bottom:10px;font-size:12px;color:var(--apex-charcoal);">${finding(x.d,state.scores[x.i])}</p><div style="font-size:12px;color:var(--apex-charcoal);"><strong>Recommended Measures:</strong><ul style="margin-top:4px;padding-left:16px;">${x.d.measures.map(m=>`<li style="padding:2px 0;">${m}</li>`).join('')}</ul></div><div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--apex-light-gray);font-size:11px;color:var(--apex-mid-gray);">Budget: ${state.budgets[x.i]} € | Payback: ~${state.paybacks[x.i]} months</div></div>`).join('')}`;}
function renderJourney(){const el=document.getElementById('tab-journey');const steps=[{title:'Hardware Inventory',desc:'Create a complete hardware inventory: capture all workstations, servers, mobile devices, peripherals and network components. Quantify the current state per dimension.'},{title:'AI Readiness Assessment & Gap Analysis',desc:'Assess hardware against AI requirements: which devices support local AI models, copilots, edge inference? Prioritize investment gaps by urgency.'},{title:'Quick Wins: Workstation Upgrade',desc:'Upgrade laptops and workstations for AI power users first. Implement RAM upgrades, SSD upgrades and network optimizations with fast ROI.'},{title:'Server & Network Investment',desc:'Medium-term hardware roadmap: procure GPU servers or book GPU cloud capacities. Expand network bandwidth for AI data volumes.'},{title:'Mobile & Edge Rollout',desc:'Deploy edge computing devices and IoT sensors for AI use cases in the field. Set up MDM solution for secure AI app distribution.'},{title:'Lifecycle Management & TCO Optimization',desc:'Re-assessment after 6–12 months. Establish hardware lifecycle processes, make TCO transparent and plan the next investment wave.'}];
el.innerHTML=`<div class="card"><h3>Hardware Transformation Journey</h3><p style="margin-bottom:20px;">The path to AI-ready hardware infrastructure — in 6 steps.</p>${steps.map((s,i)=>`<div class="journey-step"><div class="step-num">${i+1}</div><div class="step-content"><h4>${s.title}</h4><p>${s.desc}</p></div></div>`).join('')}</div><div class="card"><h3>Hardware Maturity Target Matrix</h3><table class="roi-table"><thead><tr><th>Dimension</th><th>Today</th><th>6 months</th><th>12 months</th><th>Target</th></tr></thead><tbody>${DIMS.map((d,i)=>{const s=state.scores[i],t=state.targets[i];const m6=Math.min(s+(t-s)*0.4,5);const m12=Math.min(s+(t-s)*0.75,5);return`<tr><td style="font-weight:600;color:var(--apex-navy);">${d.code}: ${d.name}</td><td style="color:${scoreColor(s)};font-weight:700;">${s.toFixed(1)}</td><td style="color:${scoreColor(m6)}">${m6.toFixed(1)}</td><td style="color:${scoreColor(m12)}">${m12.toFixed(1)}</td><td style="color:var(--apex-sky);font-weight:700;">${t.toFixed(1)}</td></tr>`;}).join('')}</tbody></table></div>`;}
function renderConfig(){const el=document.getElementById('tab-config');el.innerHTML=`<div class="card"><h3>Client &amp; General</h3><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;"><div class="config-group"><label>Client</label><input class="config-input" id="cfgClient" value="${state.client}"></div><div class="config-group"><label>Date</label><input class="config-input" id="cfgDate" type="date" value="${state.date}"></div><div class="config-group"><label>Participants (n)</label><input class="config-input" id="cfgN" type="number" value="${state.n}" min="1"></div></div></div><div class="card"><h3>Dimension Scores &amp; ROI Parameters</h3><table class="roi-table"><thead><tr><th>Dimension</th><th>Current Score</th><th>Target Score</th><th>Budget Range (€)</th><th>Payback (mo.)</th></tr></thead><tbody>${DIMS.map((d,i)=>`<tr><td style="font-weight:600;color:var(--apex-navy);">${d.code}: ${d.name}</td><td><input class="config-score" id="cfgScore${i}" type="number" value="${state.scores[i]}" min="1" max="5" step="0.1"></td><td><input class="config-target" id="cfgTarget${i}" type="number" value="${state.targets[i]}" min="1" max="5" step="0.1"></td><td><input class="budget-input" id="cfgBudget${i}" value="${state.budgets[i]}"></td><td><input class="payback-input" id="cfgPayback${i}" type="number" value="${state.paybacks[i]}" min="1"></td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Sub-Dimension Scores</h3><table class="roi-table"><thead><tr><th>Dimension</th><th>Sub 1</th><th>Sub 2</th><th>Sub 3</th></tr></thead><tbody>${DIMS.map((d,i)=>`<tr><td style="font-weight:600;color:var(--apex-navy);">${d.code}</td>${d.subs.map((s,si)=>`<td><span style="font-size:10px;color:var(--apex-mid-gray);">${s.substring(0,25)}</span><br><input class="config-score" id="cfgSub${i}_${si}" type="number" value="${state.subScores[i][si]}" min="1" max="5" step="0.1"></td>`).join('')}</tr>`).join('')}</tbody></table></div><div style="margin-top:16px;"><button onclick="applyConfig()" style="background:var(--apex-navy);color:#fff;border:none;padding:10px 28px;border-radius:6px;cursor:pointer;font-weight:600;">Update</button></div>`;}
function applyConfig(){state.client=document.getElementById('cfgClient').value;state.date=document.getElementById('cfgDate').value;state.n=parseInt(document.getElementById('cfgN').value)||1;DIMS.forEach((_,i)=>{state.scores[i]=parseFloat(document.getElementById('cfgScore'+i).value)||1;state.targets[i]=parseFloat(document.getElementById('cfgTarget'+i).value)||4;state.budgets[i]=document.getElementById('cfgBudget'+i).value;state.paybacks[i]=parseInt(document.getElementById('cfgPayback'+i).value)||12;for(let si=0;si<3;si++){state.subScores[i][si]=parseFloat(document.getElementById(`cfgSub${i}_${si}`).value)||1;}});updateMeta();renderOverview();renderDimensions();renderROI();renderAction();renderJourney();switchTab('overview');}
buildNav();updateMeta();renderOverview();renderDimensions();renderROI();renderAction();renderJourney();renderConfig();switchTab('overview');
</script>
</body>
</html>
