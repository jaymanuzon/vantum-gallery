<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantum Gallery · Frozen Artifacts</title>
<meta name="description" content="Frozen Artifacts aus der AI-Value-Capturer-Praxis von Jay Manuzon.">
<style>
  :root {
    color-scheme: light;
    --apex-navy: #1D4477;
    --apex-sky: #00B1EB;
    --apex-teal: #3ED8C3;
    --apex-deep-teal: #00A19F;
    --apex-dark-teal: #005E65;
    --apex-charcoal: #52555C;
    --apex-black: #000000;
    --apex-white: #FFFFFF;
    --apex-light-gray: #E8E8E4;
    --apex-mid-gray: #ADAFB1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--apex-white); color: var(--apex-black); }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .hdr {
    background: var(--apex-navy);
    color: var(--apex-white);
    padding: 32px 24px 26px;
  }
  .hdr-inner { max-width: 1120px; margin: 0 auto; }
  .hdr-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 12px;
  }
  .hdr h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.4px; }
  .hdr .sub { font-size: 14px; opacity: 0.82; margin-top: 5px; }
  .hdr .owner {
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    white-space: nowrap;
  }

  /* Filter row */
  .filters {
    background: var(--apex-light-gray);
    border-bottom: 1px solid var(--apex-mid-gray);
    padding: 14px 24px;
  }
  .filters-inner {
    max-width: 1120px; margin: 0 auto;
    display: flex; flex-wrap: wrap; gap: 8px;
    align-items: center;
  }
  .filters-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--apex-charcoal);
    margin-right: 6px;
  }
  .chip {
    background: var(--apex-white);
    border: 1px solid var(--apex-mid-gray);
    color: var(--apex-charcoal);
    border-radius: 18px;
    padding: 5px 13px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--apex-sky); color: var(--apex-navy); }
  .chip.active {
    background: var(--apex-navy);
    border-color: var(--apex-navy);
    color: var(--apex-white);
  }
  .chip-count {
    margin-left: 4px;
    opacity: 0.65;
    font-weight: 500;
  }

  /* Main grid */
  main { flex: 1; padding: 28px 24px 40px; }
  .grid {
    max-width: 1120px; margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  /* Card */
  .card {
    background: var(--apex-white);
    border: 1px solid var(--apex-light-gray);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(29, 68, 119, 0.12);
    border-color: var(--apex-sky);
  }
  .card-cover {
    aspect-ratio: 16 / 10;
    background: var(--apex-light-gray);
    position: relative;
    overflow: hidden;
  }
  .card-cover svg { width: 100%; height: 100%; display: block; }
  .card-body {
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .card-meta {
    display: flex; gap: 10px; align-items: center;
    font-size: 11px; color: var(--apex-charcoal);
    text-transform: uppercase; letter-spacing: 0.4px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .card-date { color: var(--apex-deep-teal); }
  .card-category {
    background: var(--apex-light-gray);
    border-radius: 4px; padding: 2px 7px;
    font-size: 10px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--apex-navy);
    line-height: 1.3;
    margin-bottom: 5px;
  }
  .card-subtitle {
    font-size: 13px;
    color: var(--apex-charcoal);
    font-style: italic;
    margin-bottom: 10px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--apex-black);
    line-height: 1.5;
    flex: 1;
  }
  .card-tags {
    margin-top: 12px;
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .tag {
    background: var(--apex-white);
    border: 1px solid var(--apex-mid-gray);
    color: var(--apex-charcoal);
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 500;
  }

  /* Empty / loading states */
  .state {
    max-width: 600px;
    margin: 60px auto;
    text-align: center;
    color: var(--apex-charcoal);
    font-size: 14px;
  }
  .state-icon { font-size: 32px; margin-bottom: 10px; color: var(--apex-mid-gray); }
  .state h3 { color: var(--apex-navy); font-size: 18px; margin-bottom: 8px; }
  .state code {
    display: inline-block;
    background: var(--apex-light-gray);
    padding: 2px 7px;
    border-radius: 4px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 12px;
    color: var(--apex-dark-teal);
    margin-top: 6px;
  }

  /* Footer */
  .ftr {
    background: var(--apex-dark-teal);
    color: var(--apex-white);
    padding: 18px 24px;
    font-size: 12px;
  }
  .ftr-inner {
    max-width: 1120px; margin: 0 auto;
    display: flex; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    opacity: 0.92;
  }

  @media (max-width: 540px) {
    .hdr { padding: 24px 18px 20px; }
    .hdr h1 { font-size: 22px; }
    main { padding: 22px 18px 32px; }
    .grid { gap: 14px; grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-top">
      <div>
        <h1 id="site-title">Vantum Gallery</h1>
        <div class="sub" id="site-sub">Frozen Artifacts aus der AI-Value-Capturer-Praxis</div>
      </div>
      <div class="owner" id="site-owner">Jay Manuzon</div>
    </div>
  </div>
</header>

<nav class="filters" id="filters" aria-label="Kategorie-Filter">
  <div class="filters-inner">
    <span class="filters-label">Filter:</span>
    <!-- chips werden per JS gerendert -->
  </div>
</nav>

<main>
  <div class="grid" id="grid"></div>
  <div class="state" id="state" hidden></div>
</main>

<footer class="ftr">
  <div class="ftr-inner">
    <span id="ftr-updated">Last updated: —</span>
    <span>Vantum · AI Value Capturer</span>
  </div>
</footer>

<script>
(function () {
  'use strict';

  const STATE = {
    artifacts: [],
    categories: [],
    activeCategory: 'all',
  };

  // Gradients pro Kategorie für Cover-Platzhalter
  const COVER_GRADIENTS = {
    'aivc-family': ['#1D4477', '#00B1EB'],     // navy → sky
    'strategie':   ['#005E65', '#3ED8C3'],     // dark teal → teal
    'default':     ['#52555C', '#ADAFB1'],     // charcoal → mid-gray
  };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[c]));
  }

  function formatDate(iso) {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function makeCoverSvg(slug, categoryId) {
    const [c1, c2] = COVER_GRADIENTS[categoryId] || COVER_GRADIENTS.default;
    const initials = slug.split('-').map(p => p.charAt(0).toUpperCase()).slice(0, 4).join('');
    const gradId = 'g_' + slug.replace(/[^a-zA-Z0-9]/g, '_');
    return `
      <svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="${c1}"/>
            <stop offset="100%" stop-color="${c2}"/>
          </linearGradient>
        </defs>
        <rect width="320" height="200" fill="url(#${gradId})"/>
        <text x="160" y="115" text-anchor="middle"
              font-family="Segoe UI, system-ui, sans-serif"
              font-size="56" font-weight="800"
              fill="rgba(255,255,255,0.92)"
              letter-spacing="-1">${escapeHtml(initials)}</text>
      </svg>
    `;
  }

  function renderChips() {
    const wrap = document.querySelector('#filters .filters-inner');
    // Existierende chips entfernen (label bleibt)
    wrap.querySelectorAll('.chip').forEach(el => el.remove());

    const total = STATE.artifacts.length;
    const all = mkChip('all', 'Alle', total);
    wrap.appendChild(all);

    STATE.categories.forEach(cat => {
      const count = STATE.artifacts.filter(a => a.category === cat.id).length;
      if (count === 0) return;
      wrap.appendChild(mkChip(cat.id, cat.label, count));
    });

    // Active state
    wrap.querySelectorAll('.chip').forEach(chip => {
      chip.classList.toggle('active', chip.dataset.cat === STATE.activeCategory);
    });
  }

  function mkChip(id, label, count) {
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.cat = id;
    b.innerHTML = `${escapeHtml(label)}<span class="chip-count">${count}</span>`;
    b.addEventListener('click', () => {
      STATE.activeCategory = id;
      renderChips();
      renderGrid();
    });
    return b;
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const list = STATE.activeCategory === 'all'
      ? STATE.artifacts
      : STATE.artifacts.filter(a => a.category === STATE.activeCategory);

    // Sortierung: Datum absteigend (neueste zuerst)
    const sorted = list.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    grid.innerHTML = sorted.map(a => `
      <a class="card" href="${escapeHtml(a.file)}" target="_blank" rel="noopener">
        <div class="card-cover">${makeCoverSvg(a.slug, a.category)}</div>
        <div class="card-body">
          <div class="card-meta">
            <span class="card-date">${escapeHtml(formatDate(a.date))}</span>
            <span class="card-category">${escapeHtml(getCategoryLabel(a.category))}</span>
          </div>
          <div class="card-title">${escapeHtml(a.title)}</div>
          ${a.subtitle ? `<div class="card-subtitle">${escapeHtml(a.subtitle)}</div>` : ''}
          <div class="card-desc">${escapeHtml(a.description || '')}</div>
          ${a.tags && a.tags.length ? `
            <div class="card-tags">
              ${a.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
            </div>` : ''}
        </div>
      </a>
    `).join('');
  }

  function getCategoryLabel(id) {
    const c = STATE.categories.find(cc => cc.id === id);
    return c ? c.label : id;
  }

  function showState(html) {
    const grid = document.getElementById('grid');
    const state = document.getElementById('state');
    grid.innerHTML = '';
    state.innerHTML = html;
    state.hidden = false;
  }

  async function init() {
    try {
      const res = await fetch('artifacts.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      // Site-Header
      if (data.site) {
        if (data.site.title) document.getElementById('site-title').textContent = data.site.title;
        if (data.site.subtitle) document.getElementById('site-sub').textContent = data.site.subtitle;
        if (data.site.owner) document.getElementById('site-owner').textContent = data.site.owner;
        if (data.site.lastUpdated) {
          document.getElementById('ftr-updated').textContent =
            'Last updated: ' + formatDate(data.site.lastUpdated);
        }
        document.title = (data.site.title || 'Vantum Gallery') + ' · Frozen Artifacts';
      }

      STATE.artifacts = data.artifacts || [];
      STATE.categories = data.categories || [];

      if (STATE.artifacts.length === 0) {
        showState(`
          <div class="state-icon">∅</div>
          <h3>Noch keine Artifacts</h3>
          <p>Die Gallery ist leer. Trag einen Eintrag in <code>artifacts.json</code> ein, dann erscheint er hier automatisch.</p>
        `);
        return;
      }

      renderChips();
      renderGrid();
    } catch (err) {
      // fetch fails: meist lokaler Aufruf (file:// oder Cowork-Preview).
      // Auf GitHub Pages (https://) funktioniert fetch direkt und dieser Block wird nie erreicht.
      const isHttps = location.protocol === 'https:' || location.protocol === 'http:';
      showState(`
        <div class="state-icon">⚠</div>
        <h3>${isHttps ? 'Daten konnten nicht geladen werden' : 'Lokale Vorschau braucht einen Mini-Server'}</h3>
        <p style="margin-bottom:14px;">
          ${isHttps
            ? 'Fehler beim Laden von <code>artifacts.json</code>: ' + escapeHtml(err.message)
            : 'Diese Datei (<code>index.html</code>) ist für die produktive Variante auf GitHub Pages gebaut. Lokal blockieren Browser den Zugriff auf <code>artifacts.json</code> aus Sicherheitsgründen.'}
        </p>
        <p><strong>Schnellster Weg lokal:</strong> öffne stattdessen <code>preview-local.html</code> im selben Ordner. Funktioniert per Doppelklick, kein Server nötig.</p>
        <p style="margin-top:14px;"><strong>Oder: lokaler Server</strong> im Terminal:</p>
        <p><code>cd &quot;PFAD/ZU/2026-05-12-gallery-stage&quot; &amp;&amp; python3 -m http.server 8080</code></p>
        <p style="margin-top:8px;">Dann öffnen: <code>http://localhost:8080/</code></p>
        <p style="margin-top:18px; font-size:12px; opacity:0.7;">Sobald die Dateien auf GitHub Pages live sind, funktioniert diese Seite direkt ohne diesen Schritt.</p>
      `);
    }
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>
